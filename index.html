<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog Manager</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
padding:30px;
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

textarea{
height:150px;
resize:none;
}

button{
padding:12px 20px;
border:none;
background:#667eea;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5563d4;
}

.blog{
margin-top:20px;
padding:20px;
background:#f8f9fa;
border-left:5px solid #667eea;
border-radius:10px;
}

.blog h2{
margin-bottom:10px;
}

.blog p{
margin-bottom:10px;
}

.author{
color:gray;
font-size:14px;
}

.delete-btn{
margin-top:10px;
background:#e63946;
}

.delete-btn:hover{
background:#c1121f;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Blog Manager</h1>

<form id="blogForm">

<input
type="text"
id="title"
placeholder="Blog Title"
required
>

<input
type="text"
id="author"
placeholder="Author Name"
required
>

<textarea
id="content"
placeholder="Write your blog here..."
required
></textarea>

<button type="submit">
Publish Blog
</button>

</form>

<div id="blogContainer"></div>

</div>

<script>

const API_URL = "http://127.0.0.1:8000/blogs";

const blogForm = document.getElementById("blogForm");
const blogContainer = document.getElementById("blogContainer");

async function fetchBlogs(){

const response = await fetch(API_URL);

const blogs = await response.json();

blogContainer.innerHTML = "";

blogs.reverse().forEach(blog => {

const div = document.createElement("div");

div.className = "blog";

div.innerHTML = `
<h2>${blog.title}</h2>
<p>${blog.content}</p>
<div class="author">
✍️ ${blog.author}
</div>

<button
class="delete-btn"
onclick="deleteBlog(${blog.id})"
>
Delete
</button>
`;

blogContainer.appendChild(div);

});

}

blogForm.addEventListener("submit", async (e)=>{

e.preventDefault();

const blog = {
title: document.getElementById("title").value,
author: document.getElementById("author").value,
content: document.getElementById("content").value
};

await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(blog)
});

blogForm.reset();

fetchBlogs();

});

async function deleteBlog(id){

if(!confirm("Delete this blog?")){
return;
}

await fetch(`${API_URL}/${id}`,{
method:"DELETE"
});

fetchBlogs();

}

fetchBlogs();

</script>

</body>
</html>
